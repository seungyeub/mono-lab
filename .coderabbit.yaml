# yaml-language-server: $schema=https://coderabbit.ai/export/schema.json
language: "ko-KR"
base_branches: ["main", "develop"] # develop 브랜치에서도 작동하게 허용
tone_instructions: "친절하고 건설적인 시니어 개발자(멘토)의 톤으로 리뷰해주세요."
reviews:
  profile: "assertive" # Invalid option: expected one of "chill"|"assertive"
  path_instructions:
    - path: "apps/portfolio/**/*.tsx"
      instructions: |
        - 해당 프로젝트는 Next.js App Router 환경입니다.
        - Server Component와 Client Component(`"use client"`)의 구분을 명확히 하고 있는지 확인하세요.
        - Client Component에서 비동기 로직이나 불필요한 번들 크기 증가가 없는지 검토하세요.
        - 모든 커스텀 스타일링은 Tailwind CSS v4 토큰을 사용해야 하며, 공유 패키지인 `@repo/ui`의 패턴을 재사용하는 방향으로 조언하세요.
    - path: "apps/portfolio/**/*.ts"
      instructions: |
        - 중요한 비즈니스 로직(특히 유틸리티 함수나 복잡한 상태 관리)에 테스트 코드가 누락되어 있다면 Colocation 방식(`*.test.ts`)의 Jest 테스트 작성을 권장하세요.
        - 이 리뷰는 참고용이므로 병합을 Block하지 않습니다.
