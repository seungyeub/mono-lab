name: Playwright Tests

on:
  pull_request:
    branches: [ "main", "develop" ]
    types: [opened, synchronize, reopened]

jobs:
  test:
    name: Run Visual Snapshot Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10.19.0
          run_install: false

      - name: Get pnpm store directory
        id: pnpm-cache
        run: |
          echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache Turborepo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-playwright-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-playwright-

      - name: Install Playwright Browsers
        run: |
          cd apps/portfolio
          pnpm exec playwright install --with-deps chromium

      - name: Build Portfolio App
        run: pnpm --filter portfolio build

      - name: Run Playwright Tests
        run: |
          cd apps/portfolio
          pnpm exec playwright test

      - name: Upload Playwright Report
        uses: actions/upload-artifact@v4
        if: always() # 실패했을 때 차이점(Diff) 이미지를 확인할 수 있도록 항상 업로드
        with:
          name: playwright-report
          path: apps/portfolio/playwright-report/
          retention-days: 14
