name: Lighthouse CI

on:
  pull_request:
    branches: ['master', 'develop']
    types: [opened, synchronize, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lighthouse:
    name: Run Lighthouse & PR Comment
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write # PR 댓글 작성을 위해 권한 필요

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10.19.0
          run_install: false

      - name: Get pnpm store directory
        id: pnpm-cache
        run: |
          echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache Turborepo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-lighthouse-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-lighthouse-

      - name: Build Portfolio App
        run: pnpm run build --filter portfolio

      - name: Run Lighthouse CI
        run: |
          cd apps/portfolio
          pnpm exec lhci autorun --config=./.lighthouserc.cjs

      - name: Parse Lighthouse Report and Add PR Comment
        uses: actions/github-script@v7
        if: always() # Lighthouse 검증이 실패하더라도 점수를 확인할 수 있도록 항상 실행
        with:
          github-token: ${{secrets.GITHUB_TOKEN}}
          script: |
            const fs = require('fs');
            const manifestPath = './apps/portfolio/.lighthouseci/manifest.json';
            const linksPath = './apps/portfolio/.lighthouseci/links.json';

            if (!fs.existsSync(manifestPath)) {
              console.log('Manifest not found');
              return;
            }

            const manifest = JSON.parse(fs.readFileSync(manifestPath, 'utf8'));
            if (!Array.isArray(manifest) || manifest.length === 0) {
              console.log('Manifest is empty');
              return;
            }
            const result = manifest[0];
            const formatResult = (res) => Math.round((res ?? 0) * 100);

            const summary = result.summary || {};
            const performance = formatResult(summary.performance);
            const accessibility = formatResult(summary.accessibility);
            const bestPractices = formatResult(summary['best-practices']);
            const seo = formatResult(summary.seo);

            // 링크 데이터가 있다면 상세 리포트 URL 파싱
            let reportUrlStr = '';
            if (fs.existsSync(linksPath)) {
              try {
                const links = JSON.parse(fs.readFileSync(linksPath, 'utf8'));
                const urlKeys = Object.keys(links);
                if (urlKeys.length > 0) {
                  reportUrlStr = `\n[🔗 상세 리포트 보러가기](${links[urlKeys[0]]})`;
                }
              } catch (error) {
                console.log('Failed to parse links.json:', error.message);
              }
            }

            // 마크다운 표 형태의 댓글 포맷
            const commentBody = `
            ## ⚡️ Lighthouse Report
            | Category | Score |
            | --- | --- |
            | 🚀 Performance | ${performance} |
            | ♿ Accessibility | ${accessibility} |
            | 💡 Best Practices | ${bestPractices} |
            | 🔎 SEO | ${seo} |
            ${reportUrlStr}

            *Tested on: \`${result.url}\`*
            `;

            // PR에 코멘트 작성
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: commentBody
            });
