sonar.projectKey=seungyeub_mono-lab
sonar.organization=seungyeub

# This is the name and version displayed in the SonarCloud UI.
sonar.projectName=mono-lab
sonar.projectVersion=1.0

# Path is relative to the sonar-project.properties file.
sonar.sources=apps,packages
sonar.exclusions=**/node_modules/**,**/.next/**,**/dist/**,**/coverage/**,**/*.test.tsx,**/*.test.ts,**/*.config.ts,**/*.setup.ts

# Encoding of the source code. Default is default system encoding
sonar.sourceEncoding=UTF-8

# Test Coverage
sonar.javascript.lcov.reportPaths=apps/portfolio/coverage/lcov.info

# 테스트 커버리지 요구사항에서 UI 컴포넌트(tsx)와 인프라 파일 면제
# - tsx: UI 컴포넌트는 수시로 변경되어 커버리지 강제 적용이 비효율적
# - actions.ts: Next.js 서버 액션 (서버 환경 의존성으로 단위 테스트 어려움)
# - useCursorStore.ts: 전역 UI 상태 스토어 (브라우저 환경 의존성)
sonar.coverage.exclusions=**/*.tsx,apps/portfolio/src/lib/actions.ts,apps/portfolio/src/store/useCursorStore.ts